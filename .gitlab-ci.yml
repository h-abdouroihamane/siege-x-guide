stages: [lint, test, deploy]

variables:
    GIT_DEPTH: '0' # historique complet — nécessaire à la détection seeders/migrations

default:
    image: php:8.4-cli
    before_script:
        - apt-get update -yqq && apt-get install -yqq git unzip libzip-dev libsqlite3-dev
        - docker-php-ext-install zip pdo_sqlite
        - curl -sS https://getcomposer.org/installer | php -- --install-dir=/usr/local/bin --filename=composer
        - curl -fsSL https://deb.nodesource.com/setup_22.x | bash - && apt-get install -yqq nodejs

cache:
    key:
        files: [composer.lock, package-lock.json]
    paths: [vendor/, node_modules/]

lint:
    stage: lint
    script:
        - composer install -q --no-ansi --no-interaction --no-scripts --no-progress --prefer-dist
        - npm ci
        - npm run format:check
        - npm run lint:check
        - npm run type-check
        - vendor/bin/phpstan analyse --no-progress --memory-limit=512M

test:
    stage: test
    script:
        - composer install --no-interaction --prefer-dist --optimize-autoloader
        - npm ci
        - cp .env.example .env
        - php artisan key:generate
        - php artisan ziggy:generate
        - npm run build
        - ./vendor/bin/pest

deploy:
    stage: deploy
    image: alpine:3.20
    needs: [lint, test]
    rules:
        - if: '$CI_COMMIT_BRANCH == "main"'
    before_script:
        - apk add --no-cache openssh-client git
        - mkdir -p ~/.ssh && chmod 700 ~/.ssh
        - cp "$SSH_PRIVATE_KEY" ~/.ssh/id_ed25519 && chmod 600 ~/.ssh/id_ed25519
        - cp "$SSH_KNOWN_HOSTS" ~/.ssh/known_hosts && chmod 644 ~/.ssh/known_hosts
    script:
        - |
            if git diff --name-only "$CI_COMMIT_BEFORE_SHA" "$CI_COMMIT_SHA" 2>/dev/null \
                 | grep -qE '^database/(seeders|migrations)/'; then
              SEED_FLAG="--seed"
            else
              SEED_FLAG=""
            fi
        - echo "Deploy flag => '${SEED_FLAG:-<routine>}'"
        - ssh -i ~/.ssh/id_ed25519 "$DEPLOY_USER@$DEPLOY_HOST" "cd '$DEPLOY_PATH' && ./scripts/deploy.sh $SEED_FLAG"
